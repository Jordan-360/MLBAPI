<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>⚾ MLB Players</title>
</head>

<body>
    <!--  NAV BAR -->
    <nav class="navbar">
        <div class="nav-brand">⚾ MLB Dashboard</div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="teams.html" class="nav-link">Teams</a></li>
            <li><a href="players.html" class="nav-link active">Players</a></li>
            <li><a href="stats.html" class="nav-link">Stats</a></li>
        </ul>
    </nav>

    <!-- PAGE HEADER -->
    <header class="page-header">
        <div class="page-header-container">
            <h1>MLB Players</h1>
            <p>Explore the top players in the league, their stats, and their career highlights.</p>
        </div>
    </header>

    <!--  MAIN CONTENT -->
    <main class="main-content">
        <div id="players-container">
            <div id="players-list" class="players-list"></div>
        </div>
    </main>

    <!--  FOOTER -->
    <footer class="footer">
        <p>&copy; <span id="year"></span> MLB Dashboard. All rights reserved.</p>
    </footer>

    <!-- SCRIPTS -->
    <script src="js/api.js"></script>
    <script src="js/components/players.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const yearEl = document.getElementById('year');
            yearEl.textContent = new Date().getFullYear();
            loadPlayers();
        });
    </script>
</body>

</html>
